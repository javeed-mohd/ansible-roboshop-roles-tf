- name: Install MySQL server
  ansible.builtin.dnf:
    name: mysql-server
    state: present

- name: Start and Enable MySQL server
  ansible.builtin.service:
    name: mysqld
    state: restarted
    enabled: yes

# We have to import python libraries botocore and boto3 for proper execution
- name: install botocore and boto3
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
  - botocore
  - boto3

- name: Setup root password
  ansible.builtin.command: mysql_secure_installation --set-root-pass "{{ MYSQL_ROOT_PASSWORD }}"

